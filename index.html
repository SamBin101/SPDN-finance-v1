<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        // Workaround for "Cannot set property fetch of #<Window> which has only a getter"
        // This error often occurs when libraries try to polyfill fetch in a restricted environment.
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() { return originalFetch; },
            set: function(v) { originalFetch = v; }
          });
        } catch (e) {
          // Fallback if defineProperty fails
          if (typeof window !== 'undefined' && !window.fetch) {
             window.fetch = function() { return Promise.reject("Fetch not available"); };
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
